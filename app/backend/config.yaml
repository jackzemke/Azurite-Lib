model:
  path: "data/models/Meta-Llama-3.1-8B-Instruct-Q4_K_M.gguf"
  n_gpu_layers: 40
  n_threads: 8
  max_tokens: 1024
  temperature: 0.0
  n_ctx: 8192

embedding:
  model_name: "nomic-ai/nomic-embed-text-v1.5"
  batch_size: 32

paths:
  raw_docs: "data/raw_docs"
  ocr: "data/ocr"
  text: "data/text"
  chunks: "data/chunks"
  embeddings: "data/embeddings"
  chroma_db: "data/index/chroma"
  metadata_index: "data/metadata_index.json"

logging:
  queries_log: "data/logs/queries.log"
  ingest_report: "data/logs/ingest_report.json"
  errors_log: "data/logs/errors.log"
  debug_mode: false

ocr:
  use_tesseract: true
  tesseract_lang: "eng"
  min_text_length: 100  # If extracted text < this, trigger OCR

chunking:
  semantic: false  # Disabled - was creating tiny header-only chunks. Use fixed-window instead.
  chunk_size_tokens: 500
  chunk_overlap_tokens: 100

index:
  top_k: 6
  similarity_threshold: 0.5

database:
  # HDP ODBC DSN for direct SQL access to Ajera (AxProject, AxTransaction).
  # DSN must be configured in the HDP driver's odbc.ini with
  # Service, HybridDataPipelineDataSource, LogonID, Password.
  # Override credentials at runtime via AAA_DB_USERNAME / AAA_DB_PASSWORD.
  dsn: "AjeraHDP"

ajera:
  # Ajera REST API sync configuration.
  # Credentials should be set via environment variables:
  #   AAA_AJERA_API_URL, AAA_AJERA_API_USERNAME, AAA_AJERA_API_PASSWORD
  # or in a .env file (see .env.example)
  #
  # API URL includes the base64-encoded config query string.
  # Get from Ajera: Utility > Setup Integrations > API Settings.
  # SMA production:
  #   api_url: "https://ajera.com/V004864/AjeraAPI.ashx?ew0KICAi..."
  # Sync interval in hours (0 = disabled, manual only)
  sync_interval_hours: 0

network_drives:
  # Directory index configuration for file location & duplicate detection
  db_path: "data/index/directory_index.db"
  drives:
    # Uncomment and configure for your network drives:
    # - name: "S Drive"
    #   mount_path: "/mnt/s_drive"      # Linux mount point
    #   drive_letter: "S"               # Windows drive letter for display
    #   has_department_level: true       # Drive > Dept > Project (3 levels)
    # - name: "P Drive"
    #   mount_path: "/mnt/p_drive"
    #   drive_letter: "P"
    #   has_department_level: false      # Drive > Project (2 levels)
