version: '3.8'

services:
  backend:
    image: azurite-lib-backend:local
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: aaa-backend
    user: root
    volumes:
      - ./data:/data
      - ./app/backend/app:/app/app
      - ./app/backend/config.yaml:/app/config.yaml:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      - CONFIG_PATH=/app/config.yaml
      - AAA_BASE_DIR=/
      - AAA_FRONTEND_URL=http://localhost
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - ./app/backend/.env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    image: azurite-lib-backend:local
    container_name: aaa-worker
    user: root
    volumes:
      - ./data:/data
      - ./app/backend/app:/app/app
      - ./app/backend/config.yaml:/app/config.yaml:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      - CONFIG_PATH=/app/config.yaml
      - AAA_BASE_DIR=/
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - ./app/backend/.env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import rq; print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    command: ["python", "-m", "rq.cli", "worker", "--url", "redis://redis:6379/0", "ingestion"]

  redis:
    image: redis:7-alpine
    container_name: aaa-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: aaa-frontend
    ports:
      - "3002:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

volumes:
  redis_data:
