version: '3.8'

services:
  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: project-library-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./app/backend/config.yaml:/app/config.yaml
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      - CONFIG_PATH=/app/config.yaml
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Alternative for older Docker versions:
    # runtime: nvidia
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    container_name: project-library-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
    command: npm run dev -- --host 0.0.0.0

  # Optional: Run Chroma as separate service (currently embedded in backend)
  # Uncomment if you want to scale Chroma independently
  # chroma:
  #   image: ghcr.io/chroma-core/chroma:latest
  #   container_name: project-library-chroma
  #   ports:
  #     - "8001:8000"
  #   volumes:
  #     - ./data/index/chroma:/chroma/chroma
  #   environment:
  #     - IS_PERSISTENT=TRUE
  #     - ANONYMIZED_TELEMETRY=FALSE

volumes:
  data:
    driver: local

# NOTES:
# 
# 1. GPU Support:
#    - Requires NVIDIA Container Toolkit installed on host
#    - Install: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
#    - Verify: docker run --rm --gpus all nvidia/cuda:11.8.0-base-ubuntu22.04 nvidia-smi
#
# 2. CPU Fallback:
#    If GPU not available, remove the `deploy.resources` section and set in config.yaml:
#    model:
#      n_gpu_layers: 0
#
# 3. Model File:
#    Before running, ensure model file exists at:
#    ./data/models/Llama-3.2-3B-Instruct-Q6_K.gguf
#    
#    If missing, backend runs in stub mode (deterministic test responses)
#
# 4. Ports:
#    - 8000: Backend API
#    - 5173: Frontend (Vite dev server)
#    - 8001: Chroma (if using separate service)
#
# 5. Data Persistence:
#    All data stored in ./data/ directory (mounted as volume):
#    - raw_docs/: Uploaded documents
#    - chunks/: Chunked JSON files
#    - embeddings/: Parquet files
#    - index/chroma/: Vector DB
#    - logs/: Query and ingestion logs
#
# 6. Build and Run:
#    docker-compose up --build
#
# 7. View Logs:
#    docker-compose logs -f backend
#
# 8. Stop:
#    docker-compose down
#
# 9. Clean Rebuild:
#    docker-compose down -v
#    docker-compose build --no-cache
#    docker-compose up
