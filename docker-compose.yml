services:
  # ---------- Backend API ----------
  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: aaa-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./app/backend/config.yaml:/app/config.yaml:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      - CONFIG_PATH=/app/config.yaml
      - AAA_BASE_DIR=/
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - ./app/backend/.env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------- RQ Worker (background ingestion jobs) ----------
  worker:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: aaa-worker
    volumes:
      - ./data:/data
      - ./app/backend/config.yaml:/app/config.yaml:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      - CONFIG_PATH=/app/config.yaml
      - AAA_BASE_DIR=/
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - ./app/backend/.env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    command: ["python", "-m", "rq.cli", "worker", "--url", "redis://redis:6379/0", "ingestion"]

  # ---------- Redis (job queue) ----------
  redis:
    image: redis:7-alpine
    container_name: aaa-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------- Frontend (nginx serving React + API proxy) ----------
  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: aaa-frontend
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

volumes:
  redis_data:

# NOTES:
#
# 1. GPU Support:
#    - Requires NVIDIA Container Toolkit installed on host
#    - Install: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
#    - Verify: docker run --rm --gpus all nvidia/cuda:12.1.0-base-ubuntu22.04 nvidia-smi
#
# 2. CPU Fallback:
#    If GPU not available, remove the `deploy.resources` section from
#    both backend and worker, and set in config.yaml:
#      model:
#        n_gpu_layers: 0
#
# 3. Model File:
#    Before running, ensure model file exists at:
#    ./data/models/Meta-Llama-3.1-8B-Instruct-Q6_K.gguf
#
#    If missing, backend runs in stub mode (deterministic test responses).
#
# 4. Environment:
#    Copy app/backend/.env.example to app/backend/.env and fill in values.
#    Env vars override config.yaml settings.
#
# 5. Ports:
#    - 80:   Frontend (nginx — serves UI + proxies /api/ to backend)
#    - 8000: Backend API (direct access, useful for debugging)
#    - 6379: Redis (only exposed for debugging; remove in production)
#
# 6. Data Persistence:
#    All data stored in ./data/ directory (bind-mounted):
#    - raw_docs/:           Uploaded documents
#    - chunks/:             Chunked JSON files
#    - embeddings/:         Parquet files
#    - index/chroma/:       Vector DB
#    - models/:             LLM and embedding model files
#    - logs/:               Query and ingestion logs
#
# 7. Build and Run:
#    docker compose up --build -d
#
# 8. View Logs:
#    docker compose logs -f backend
#    docker compose logs -f worker
#
# 9. Stop:
#    docker compose down
#
# 10. Clean Rebuild:
#     docker compose down -v
#     docker compose build --no-cache
#     docker compose up -d
